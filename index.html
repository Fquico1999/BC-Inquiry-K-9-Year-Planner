<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BC Elementary Year Planning Tool</title>
<link rel="icon" type="image/png" href="./images/favicon.png">
<!-- xlsx-js-style: SheetJS community build + cell styling (bold, fills, borders, wrap) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<!-- JSZip: lets us inject freeze panes into the exported workbook (xlsx-js-style can't write panes) -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{
    --paper:#f5f6f3; --card:#ffffff; --ink:#20262e; --ink-soft:#5a6675;
    --line:#e3e6e0; --line-soft:#eef0ec; --accent:#0e7c66; --accent-ink:#0a5c4b;
    --warn-bg:#fbeee0; --warn-ink:#8a4b16; --warn-line:#e8c39a;
    --t0:#c65d5d; --t1:#c8893a; --t2:#7b5ea7; --t3:#2e8b8b; --t4:#3f6fb0; --t5:#5c8a3c;
    --r:10px; --r-sm:7px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

  /* ---- shell ---- */
  .app{max-width:1180px;margin:0 auto;padding:0 20px 120px}
  header.bar{display:flex;align-items:center;gap:16px;padding:18px 0 16px;
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand h1{font-size:19px;margin:0;letter-spacing:-.01em;font-weight:680}
  .brand p{margin:1px 0 0;font-size:12.5px;color:var(--ink-soft);letter-spacing:.02em;text-transform:uppercase}
  .bar .spacer{flex:1}
  .data-chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;
    color:var(--ink-soft);background:var(--card);border:1px solid var(--line);
    padding:6px 11px;border-radius:999px}
  .data-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .data-chip.sample .dot{background:var(--t1)}

  /* ---- layout ---- */
  .layout{display:grid;grid-template-columns:228px 1fr;gap:34px;margin-top:26px}
  @media (max-width:820px){.layout{grid-template-columns:1fr;gap:18px}}

  /* ---- stepper ---- */
  .rail{position:sticky;top:18px;align-self:start}
  .rail ol{list-style:none;margin:0;padding:0;counter-reset:s}
  .rail li{counter-increment:s;display:flex;gap:12px;padding:9px 0;color:var(--ink-soft);
    font-size:14px;cursor:pointer;align-items:flex-start}
  .rail li .num{flex:none;width:25px;height:25px;border-radius:50%;border:1.5px solid var(--line);
    display:grid;place-items:center;font-size:12.5px;font-weight:650;background:var(--card);color:var(--ink-soft)}
  .rail li .num::before{content:counter(s)}
  .rail li.active{color:var(--ink);font-weight:620}
  .rail li.active .num{border-color:var(--accent);background:var(--accent);color:#fff}
  .rail li.done .num{border-color:var(--accent);color:var(--accent)}
  .rail li.done .num::before{content:"✓"}
  .rail li.disabled{opacity:.45;cursor:not-allowed}
  @media (max-width:820px){
    .rail{position:static}
    .rail ol{display:flex;gap:6px;overflow:auto}
    .rail li{flex-direction:column;align-items:center;gap:5px;text-align:center;font-size:11px;min-width:64px}
  }

  /* ---- main / cards ---- */
  .step-head{margin:0 0 4px}
  .step-head h2{font-size:23px;margin:0;letter-spacing:-.015em;font-weight:680}
  .step-head p{margin:5px 0 0;color:var(--ink-soft);max-width:62ch}
  .step-head.wide p{max-width:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-top:18px}
  .card.spine{border-left-width:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media (max-width:560px){.grid2{grid-template-columns:1fr}}
  label.fld{display:block}
  label.fld .lab{display:block;font-size:13px;font-weight:620;margin-bottom:6px;letter-spacing:.01em}
  label.fld .hint{font-weight:400;color:var(--ink-soft);font-size:12px}
  input[type=date],input[type=number],input[type=text],select,textarea{
    width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);
    border-radius:var(--r-sm);padding:9px 11px}
  textarea{resize:vertical;min-height:64px;line-height:1.45}
  input:focus,select:focus,textarea:focus,button:focus-visible,.chip:focus-visible{
    outline:2px solid var(--accent);outline-offset:1px}
  .inline{display:flex;align-items:center;gap:10px}
  .switch{display:inline-flex;align-items:center;gap:9px;font-size:14px;cursor:pointer;user-select:none}
  .switch input{width:auto}

  /* ---- theme tabs ---- */
  .theme-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .theme-tab{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;
    border:1px solid var(--line);background:var(--card);font-size:13px;color:var(--ink-soft);
    max-width:240px}
  .theme-tab .swatch{width:10px;height:10px;border-radius:50%;flex:none}
  .theme-tab .tt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .theme-tab.active{color:var(--ink);border-color:var(--ink);font-weight:620}
  .theme-tab .chk{font-size:11px;color:var(--accent)}

  /* ---- subject chips ---- */
  .chips{display:flex;gap:9px;flex-wrap:wrap}
  .chip{padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;
    font-size:13.5px;color:var(--ink);transition:background .12s,border-color .12s}
  .chip[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---- standards (collapsible) ---- */
  .subj-card{border:1px solid var(--line);border-radius:var(--r);margin-top:14px;overflow:hidden}
  .subj-head{width:100%;margin:0;padding:13px 16px;background:var(--line-soft);font-size:15px;
    display:flex;align-items:center;gap:10px;border:none;text-align:left;color:var(--ink)}
  .subj-head:hover{background:#e7eae5}
  .subj-head .subj-name{font-weight:680;flex:1}
  .subj-head .count{font-size:12px;color:var(--ink-soft);font-weight:500}
  .chev{flex:none;width:13px;color:var(--ink-soft);font-size:10px}
  .subj-body{padding:4px 16px 16px}
  .grade-band{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--ink-soft);margin:14px 0 6px;border-bottom:1px solid var(--line-soft);padding-bottom:5px}

  /* section: competencies vs content */
  .std-section{border:1px solid var(--line);border-radius:var(--r-sm);margin-top:10px;overflow:hidden;
    border-left-width:3px}
  .std-section.comp{border-left-color:var(--accent)}
  .std-section.content{border-left-color:var(--t4)}
  .sec-head{width:100%;border:none;background:#fbfcfb;display:flex;align-items:center;gap:9px;
    padding:9px 12px;text-align:left;color:var(--ink)}
  .sec-head:hover{background:#f1f3f0}
  .sec-head .sec-title{flex:1;font-size:13px;font-weight:680;letter-spacing:.01em}
  .std-section.comp .sec-head .sec-title{color:var(--accent-ink)}
  .std-section.content .sec-head .sec-title{color:#2f5588}
  .sec-head .sec-count{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .sec-body{padding:2px 12px 8px}

  /* group / theme within a section */
  .std-grp{margin-top:4px}
  .grp-head{width:100%;border:none;background:none;display:flex;align-items:center;gap:8px;
    padding:6px 2px;text-align:left}
  .grp-head .grp-name{flex:1;font-size:12.5px;font-weight:620;color:var(--ink)}
  .grp-head:hover .grp-name{color:#000}
  .grp-head .grp-count{font-size:11.5px;color:var(--accent)}
  .grp-body{padding-left:4px}

  .std{border-bottom:1px solid var(--line-soft)}
  .std:last-child{border-bottom:none}
  .std-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0}
  .std-row input{margin-top:3px;width:auto;flex:none}
  .std-row .txt{flex:1;font-size:14px}
  .std-row .exp{flex:none;background:none;border:none;color:var(--ink-soft);font-size:12px;
    padding:2px 5px;border-radius:5px}
  .std-row .exp:hover{background:var(--line-soft)}
  .elab{display:none;padding:0 0 9px 30px;font-size:13px;color:var(--ink-soft)}
  .elab.open{display:block}
  .elab dt{font-style:italic;color:var(--ink);font-weight:600}
  .elab dd{margin:0 0 6px}
  .keyc{margin-top:14px}
  .empty-note{color:var(--ink-soft);font-size:13.5px;font-style:italic;padding:6px 0}

  /* ---- schedule ---- */
  .sched-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;
    padding:13px 14px;border:1px solid var(--line);border-radius:var(--r);margin-top:10px;
    border-left-width:4px}
  .sched-row .drag-handle{cursor:grab;color:var(--ink-soft);font-size:18px;line-height:1;
    user-select:none;touch-action:none;padding:6px 3px;border-radius:6px;align-self:center}
  .sched-row .drag-handle:hover{background:var(--line-soft);color:var(--ink)}
  .sched-row.dragging{opacity:.55;border-style:dashed;background:var(--line-soft)}
  .sched-row.dragging .drag-handle{cursor:grabbing}
  .sched-row .nm{font-weight:620;min-width:0}
  .sched-row .nm small{display:block;font-weight:400;color:var(--ink-soft);font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (max-width:620px){.sched-row{grid-template-columns:auto 1fr;row-gap:8px}}
  .meter{margin-top:18px;font-size:14px}
  .banner{border-radius:var(--r);padding:13px 16px;margin-top:14px;font-size:14px;
    border:1px solid var(--warn-line);background:var(--warn-bg);color:var(--warn-ink)}
  .banner.ok{border-color:#bcd9c4;background:#eaf4ec;color:#2c6e49}

  /* ---- schedule: per-unit dates + week badge ---- */
  .sched-row .udates{display:flex;align-items:center;gap:6px}
  .sched-row .udates input[type=date]{width:142px;font-size:13px;padding:7px 9px}
  .sched-row .udates .dash{color:var(--ink-soft)}
  .sched-row .udates .reset-dates{border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    border-radius:6px;font-size:11px;padding:3px 8px}
  .sched-row .udates .reset-dates:hover{background:var(--line-soft)}
  .sched-row .wk-cell{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;
    gap:4px;min-height:42px;min-width:140px;text-align:right}
  .wk-badge{display:inline-block;font-size:12.5px;font-weight:620;color:var(--accent-ink);
    background:#e7f1ee;border:1px solid #bcd9c4;border-radius:999px;padding:3px 10px;white-space:nowrap}
  .wk-badge.none{color:var(--warn-ink);background:var(--warn-bg);border-color:var(--warn-line);font-weight:500}
  .wk-sub{display:block;font-size:11px;color:var(--ink-soft);line-height:1.3}
  .row-warn{font-size:11.5px;color:var(--warn-ink)}
  @media (max-width:620px){.sched-row .udates,.sched-row .wk-cell{grid-column:1/3}
    .sched-row .wk-cell{align-items:flex-start;text-align:left}}

  /* ---- breaks in Plan setup ---- */
  .breaks-block .break-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:9px;
    align-items:center;margin-bottom:9px}
  .breaks-block .break-row .bk-name{min-width:0}
  .breaks-block .break-row input[type=date]{width:152px}
  .breaks-block .break-row .dash{color:var(--ink-soft)}
  .breaks-block .bk-del{border:1px solid var(--line);background:#fff;color:var(--warn-ink);
    border-radius:6px;width:32px;height:36px;font-size:13px}
  .breaks-block .bk-del:hover{background:var(--warn-bg)}
  .btn.add-break{padding:8px 14px;font-size:13px;border-radius:var(--r-sm)}
  @media (max-width:560px){.breaks-block .break-row{grid-template-columns:1fr 1fr auto}
    .breaks-block .break-row .bk-name{grid-column:1/3}.breaks-block .break-row .dash{display:none}}

  /* ---- break reference on schedule step ---- */
  .break-ref{margin-top:16px;display:flex;flex-wrap:wrap;gap:9px;align-items:center;font-size:13px;color:var(--ink-soft)}
  .break-ref .br-head{font-weight:620}
  .br-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);
    background:#fff;border:1px dashed var(--line);border-radius:999px;padding:4px 10px}
  .br-chip.bad{border-color:var(--warn-line);color:var(--warn-ink)}
  .br-dot{width:7px;height:7px;border-radius:50%;background:#8a8f98}
  .linklike{background:none;border:none;color:var(--accent);font-size:inherit;padding:0;text-decoration:underline;cursor:pointer}

  /* ---- export ---- */
  .ov-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px}
  .ov-table th,.ov-table td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  .ov-table th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)}
  .ov-table td .sw{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}

  /* ---- action bar ---- */
  .actions{position:fixed;left:0;right:0;bottom:0;background:rgba(245,246,243,.92);
    backdrop-filter:blur(8px);border-top:1px solid var(--line)}
  .actions .inner{max-width:1180px;margin:0 auto;padding:13px 20px;display:flex;
    align-items:center;gap:12px}
  .btn{padding:11px 20px;border-radius:var(--r-sm);font-size:14.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:disabled{background:#b7c4bf;border-color:#b7c4bf;cursor:not-allowed}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
  .actions .spacer{flex:1}
  .actions .msg{font-size:13px;color:var(--ink-soft)}
  .vh{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="brand">
      <h1>BC Elementary Year Planning Tool</h1>
      <p>BC Curriculum · K–7</p>
    </div>
    <div class="spacer"></div>
    <span id="dataChip" class="data-chip"><span class="dot"></span><span id="dataLabel">Sample data</span></span>
    <button class="btn" id="loadBtn">Load curriculum…</button>
    <input type="file" id="fileInput" accept="application/json,.json" class="vh">
  </header>

  <div class="layout">
    <nav class="rail" aria-label="Steps">
      <ol id="rail"></ol>
    </nav>
    <main id="main" aria-live="polite"></main>
  </div>
</div>

<div class="actions">
  <div class="inner">
    <button class="btn ghost" id="backBtn">← Back</button>
    <span class="spacer"></span>
    <span class="msg" id="actionMsg"></span>
    <button class="btn primary" id="nextBtn">Continue →</button>
  </div>
</div>

<script>
/* ===================================================================== *
 * Sample curriculum — same shape as bc_curriculum.json. Replace by
 * loading the real file via "Load curriculum…".
 * ===================================================================== */
const SAMPLE = {
  source:"sample", max_grade:7,
  subjects:{
    "Mathematics":{slug:"mathematics",grades:{
      "3":{curricular_competencies:[
            {text:"Use reasoning to explore and make connections",group:"Reasoning and analyzing",
             elaborations:{reasoning:"inductive and deductive reasoning; prediction; analysis"}},
            {text:"Develop mental math strategies to solve problems",group:"Reasoning and analyzing",elaborations:{}}],
           content:[
            {text:"addition and subtraction facts to 20",group:null,
             elaborations:{"facts to 20":"introduce computational strategies, e.g., decomposing, making and bridging 10"}},
            {text:"fractions concepts",group:null,elaborations:{fractions:"part/whole, equal sharing"}}]},
      "4":{curricular_competencies:[
            {text:"Estimate reasonably to solve problems",group:"Reasoning and analyzing",elaborations:{estimate:"strategies for estimating quantities"}}],
           content:[
            {text:"multiplication and division facts to 100",group:null,elaborations:{}},
            {text:"decimals to hundredths",group:null,elaborations:{}}]}}},
    "Science":{slug:"science",grades:{
      "3":{curricular_competencies:[
            {text:"Make observations about living and non-living things",group:"Questioning and predicting",elaborations:{observations:"use senses and simple tools"}}],
           content:[
            {text:"biodiversity in the local environment",group:null,elaborations:{biodiversity:"variety of living things in a region"}}]},
      "4":{curricular_competencies:[
            {text:"Identify questions about familiar objects that can be investigated",group:"Questioning and predicting",elaborations:{}}],
           content:[
            {text:"sensing and responding: humans, other animals, plants",group:null,elaborations:{}}]}}},
    "Arts Education":{slug:"arts-education",grades:{
      "3":{curricular_competencies:[
            {text:"Explore artistic expressions of self and community",group:"Exploring and creating",elaborations:{community:"local, cultural, and global communities"}}],
           content:[
            {text:"elements in the arts: dance, drama, music, visual arts",group:null,elaborations:{}}]},
      "4":{curricular_competencies:[
            {text:"Create artistic works collaboratively and individually",group:"Exploring and creating",elaborations:{}}],
           content:[{text:"image-development strategies",group:null,elaborations:{}}]}}}
  }
};

/* ===================================================================== *
 * State
 * ===================================================================== */
const THEMES = [
  {name:"Who We Are", color:"var(--t0)", hex:"#c65d5d"},
  {name:"Where We Are in Place and Time", color:"var(--t1)", hex:"#c8893a"},
  {name:"How We Express Ourselves", color:"var(--t2)", hex:"#7b5ea7"},
  {name:"How the World Works", color:"var(--t3)", hex:"#2e8b8b"},
  {name:"How We Organize Ourselves", color:"var(--t4)", hex:"#3f6fb0"},
  {name:"Sharing the Planet", color:"var(--t5)", hex:"#5c8a3c"},
];
const THEME_HEX = ["c65d5d","c8893a","7b5ea7","2e8b8b","3f6fb0","5c8a3c"];
const GRADE_ORDER = ["K","1","2","3","4","5","6","7"];
const STEPS = ["Plan setup","Build units","Order & Schedule","Generate & Export"];

/* ---- xlsx-js-style cell + style helpers (used at export) ---- */
function xc(v,s){return {v:v==null?"":String(v),t:"s",s:s||{}};}        // string cell
function xn(v,s){return {v:Number(v)||0,t:"n",s:s||{}};}                // number cell
function thinB(rgb){const b={style:"thin",color:{rgb}};return{top:b,bottom:b,left:b,right:b};}
const STY={
  ovTitle:{font:{bold:true,sz:14,color:{rgb:"20262E"}}},
  ovSub:{font:{sz:11,italic:true,color:{rgb:"5A6675"}}},
  ovHead:{font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"20262E"}},alignment:{vertical:"center"},border:thinB("D9DCD6")},
  ovCell:{font:{sz:11,color:{rgb:"20262E"}},alignment:{vertical:"top",wrapText:true},border:thinB("E3E6E0")},
  meta:{font:{sz:11,italic:true,color:{rgb:"5A6675"}}},
  central:{font:{bold:true,sz:11,color:{rgb:"20262E"}},alignment:{wrapText:true,vertical:"top"}},
  sep:{font:{sz:11,color:{rgb:"C9CEC7"}}},
  subject:{font:{bold:true,sz:12,color:{rgb:"20262E"}},fill:{fgColor:{rgb:"EEF0EC"}}},
  keyc:{font:{italic:true,sz:11,color:{rgb:"0A5C4B"}},alignment:{wrapText:true,vertical:"top"}},
  label:{font:{bold:true,sz:11,color:{rgb:"0A5C4B"}}},
  bullet:{font:{sz:11,color:{rgb:"20262E"}},alignment:{wrapText:true,vertical:"top"}},
  elab:{font:{italic:true,sz:10,color:{rgb:"5A6675"}},alignment:{wrapText:true,vertical:"top"}},
};
const themeBand=hex=>({font:{bold:true,sz:14,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:hex}},alignment:{vertical:"center"}});
const themeCell=hex=>({font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:hex}},alignment:{vertical:"center"},border:thinB("E3E6E0")});
STY.ovBreakHead={font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"8A8F98"}},alignment:{vertical:"center"},border:thinB("D9DCD6")};
STY.ovBreakCell={font:{italic:true,sz:11,color:{rgb:"5A6675"}},alignment:{vertical:"top"},border:thinB("E3E6E0")};
STY.breakNote={font:{italic:true,sz:11,color:{rgb:"8A4B16"}}};
// Per-unit sheet: subjects laid out as side-by-side columns with aligned bands.
STY.subjHead={font:{bold:true,sz:12,color:{rgb:"20262E"}},fill:{fgColor:{rgb:"EEF0EC"}},
  alignment:{horizontal:"center",vertical:"center",wrapText:true},border:thinB("D9DCD6")};
STY.keyCol={font:{italic:true,sz:10,color:{rgb:"0A5C4B"}},alignment:{wrapText:true,vertical:"top"},border:thinB("E3E6E0")};
STY.cellComp={font:{sz:11,color:{rgb:"20262E"}},alignment:{wrapText:true,vertical:"top"},border:thinB("E3E6E0")};
STY.cellCont={font:{sz:11,color:{rgb:"20262E"}},alignment:{wrapText:true,vertical:"top"},border:thinB("E3E6E0")};
STY.pad={fill:{fgColor:{rgb:"FBFCFB"}},border:thinB("EEF0EC")};
STY.compHead={font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"0E7C66"}},alignment:{vertical:"center"},border:thinB("0A5C4B")};
STY.contHead={font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"3F6FB0"}},alignment:{vertical:"center"},border:thinB("2F5588")};

// Shared separator rule used on every unit sheet.
const SEP="────────────────────────────────────────";

const state = {
  data:SAMPLE, dataLabel:"Sample data",
  step:0, activeTheme:0,
  setup:{ start:isoDefault("start"), end:isoDefault("end"), split:false, grade:"3", grade2:"4", defaultWeeks:6 },
  units:THEMES.map(()=>({ subjects:[], perSubject:{}, centralIdea:"", assessment:"" })),
  order:[0,1,2,3,4,5],
  durations:{}, // themeIndex -> weeks (legacy; seeding now uses defaultWeeks)
  unitDates:{}, // themeIndex -> {start,end} ISO — manual override; absent = auto-seeded
  breaks:[],    // [{id,name,start,end}]
  breakSeq:0,
  ui:{collapsed:{}}, // collapse state keyed by node (card/section/group)
};

/* ===================================================================== *
 * Date helpers
 * ===================================================================== */
function firstTuesdayAfterLabourDay(y){let d=new Date(y,8,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+1);return d;}
function lastFridayOfJune(y){let d=new Date(y,5,30);while(d.getDay()!==5)d.setDate(d.getDate()-1);return d;}
function iso(d){const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function isoDefault(which){const y=new Date().getFullYear();return which==="start"?iso(firstTuesdayAfterLabourDay(y)):iso(lastFridayOfJune(y+1));}
function parseISO(s){const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c);}
function nice(d){return d.toLocaleDateString("en-CA",{month:"short",day:"numeric"});}
function niceFull(d){return d.toLocaleDateString("en-CA",{month:"long",day:"numeric"});}
const DAY=864e5;
function addDays(d,n){return new Date(d.getTime()+n*DAY);}
function dayCount(a,b){return Math.round((b.getTime()-a.getTime())/DAY)+1;}        // inclusive span
function overlapDays(s1,e1,s2,e2){                                                  // inclusive Date overlap
  const lo=Math.max(s1.getTime(),s2.getTime()), hi=Math.min(e1.getTime(),e2.getTime());
  return hi<lo?0:Math.round((hi-lo)/DAY)+1;
}
function fmtWeeks(days){const w=Math.round(days/7*10)/10;return Number.isInteger(w)?String(w):w.toFixed(1);}

/* ===================================================================== *
 * Derived helpers
 * ===================================================================== */
function grades(){return state.setup.split?[state.setup.grade,state.setup.grade2]:[state.setup.grade];}
function subjectNames(){return Object.keys(state.data.subjects||{}).sort();}
function standardsFor(subj,grade){
  const s=state.data.subjects[subj]; const g=s&&s.grades&&s.grades[grade];
  return {comp:(g&&g.curricular_competencies)||[], content:(g&&g.content)||[]};
}
function unitStarted(idx){const u=state.units[idx];return u.subjects.length>0||u.centralIdea.trim()||u.assessment.trim();}
function breakIntervals(){
  return state.breaks
    .filter(b=>b.start&&b.end)
    .map(b=>({name:b.name||"Break", s:parseISO(b.start), e:parseISO(b.end)}))
    .filter(b=>b.e>=b.s)
    .sort((a,b)=>a.s-b.s);
}

/* Lay one unit starting at `start` for `durDays` calendar days, then extend the
 * end so any break that falls *inside* the unit is given back as extra calendar
 * time (teaching length is preserved). A break that overlaps the unit's start
 * date is left alone (no extension), per the planning rule. */
function seedEnd(start,durDays,brks){
  let end=addDays(start,durDays-1);
  for(let guard=0;guard<120;guard++){
    let bd=0;
    brks.forEach(b=>{
      if(b.s.getTime()<=start.getTime() && start.getTime()<=b.e.getTime()) return; // covers the start → skip
      bd+=overlapDays(start,end,b.s,b.e);
    });
    const want=addDays(start,durDays-1+bd);
    if(want.getTime()>end.getTime()) end=want; else break;
  }
  return end;
}

/* The schedule shows only units started in step 2. Each unit's dates are
 * pre-filled from the school-year start + default duration (flowing around
 * breaks); a unit the teacher has dated by hand keeps those dates and the
 * sequence continues after it. Duration in weeks is derived from the dates. */
function schedule(){
  const ys=parseISO(state.setup.start), ye=parseISO(state.setup.end);
  const validDates=ye>ys;
  const brks=breakIntervals();
  const durDays=Math.max(1,Math.round(state.setup.defaultWeeks*7));
  const startedOrder=state.order.filter(unitStarted);
  let cursor=new Date(ys);
  const rows=startedOrder.map((idx,pos)=>{
    const ov=state.unitDates[idx];
    let s,e,manual=false;
    if(ov&&ov.start&&ov.end){ s=parseISO(ov.start); e=parseISO(ov.end); manual=true; }
    else{ s=new Date(cursor); e=seedEnd(s,durDays,brks); }
    cursor=addDays(e,1);
    const valid=e>=s;
    const withinYear=valid&&s>=ys&&e<=ye;
    const spanDays=valid?dayCount(s,e):0;
    let breakDays=0; const overlaps=[];
    if(valid)brks.forEach(b=>{const d=overlapDays(s,e,b.s,b.e);if(d>0){breakDays+=d;overlaps.push({name:b.name,days:d});}});
    const teachingDays=Math.max(0,spanDays-breakDays);
    return {idx,pos,start:s,end:e,manual,valid,withinYear,spanDays,breakDays,teachingDays,overlaps};
  });
  const breaksOut=brks.map((b,i)=>({id:i,name:b.name,start:b.s,end:b.e,
    days:dayCount(b.s,b.e),withinYear:b.s>=ys&&b.e<=ye}));
  const issues=[];
  rows.forEach(r=>{const nm=THEMES[r.idx].name;
    if(!r.valid)issues.push(`“${nm}” ends before it starts.`);
    else if(!r.withinYear)issues.push(`“${nm}” falls outside the school year.`);
  });
  const over=validDates&&rows.some(r=>r.valid&&r.end>ye);
  const ready=validDates&&rows.length>0&&rows.every(r=>r.valid&&r.withinYear);
  return {ys,ye,validDates,rows,breaks:breaksOut,issues,over,ready};
}
function effectiveDatesFor(idx){
  const r=schedule().rows.find(r=>r.idx===idx);
  return r?{start:iso(r.start),end:iso(r.end)}:{start:state.setup.start,end:state.setup.start};
}

/* ===================================================================== *
 * Render — shell
 * ===================================================================== */
const main=document.getElementById("main");

function render(){renderRail();renderStep();renderActions();}

function renderRail(){
  const sc=schedule();
  const reach=[true,true,true, sc.ready]; // step 4 gated
  document.getElementById("rail").innerHTML=STEPS.map((s,i)=>{
    const cls=[i===state.step?"active":"", i<state.step?"done":"", !reach[i]?"disabled":""].join(" ");
    return `<li class="${cls}" data-step="${i}"><span class="num"></span><span>${s}</span></li>`;
  }).join("");
  document.querySelectorAll("#rail li").forEach(li=>li.onclick=()=>{
    const i=+li.dataset.step; if(li.classList.contains("disabled"))return; state.step=i; render();
  });
}

function renderStep(){
  ({0:setupStep,1:unitsStep,2:scheduleStep,3:exportStep})[state.step]();
}

function renderActions(){
  const back=document.getElementById("backBtn"), next=document.getElementById("nextBtn"),
        msg=document.getElementById("actionMsg");
  back.style.visibility=state.step===0?"hidden":"visible";
  const sc=schedule();
  if(state.step===3){
    next.textContent="Generate Year Plan";
    next.disabled=!sc.ready;
    msg.textContent = !sc.validDates ? "Check your school-year dates."
      : !sc.rows.length ? "Start at least one unit in step 2."
      : sc.issues.length ? sc.issues[0]
      : "";
    next.onclick=generate;
  }else{
    next.textContent="Continue →"; next.disabled=false; msg.textContent="";
    next.onclick=()=>{ if(state.step===2&&!sc.ready){state.step=2;render();return;} state.step++; render(); };
  }
  back.onclick=()=>{state.step=Math.max(0,state.step-1);render();};
}

/* ===================================================================== *
 * Step 1 — Setup
 * ===================================================================== */
function setupStep(){
  const s=state.setup;
  const opts=g=>GRADE_ORDER.map(x=>`<option ${x===g?"selected":""}>${x}</option>`).join("");
  main.innerHTML=`
   <div class="step-head wide"><h2>Plan setup</h2>
     <p>Set the school year, the grade you teach, any breaks, and a default unit length. You’ll fine-tune each unit’s exact dates on the schedule step.</p></div>
   <div class="card">
     <div class="grid2">
       <label class="fld"><span class="lab">School year starts</span>
         <input type="date" id="start" value="${s.start}"></label>
       <label class="fld"><span class="lab">School year ends</span>
         <input type="date" id="end" value="${s.end}"></label>
     </div>
     <div style="margin-top:16px">
       <label class="switch"><input type="checkbox" id="split" ${s.split?"checked":""}> This is a split class (two sequential grades)</label>
     </div>
     <div class="grid2" style="margin-top:12px">
       <label class="fld"><span class="lab">${s.split?"First grade":"Grade level"}</span>
         <select id="grade">${opts(s.grade)}</select></label>
       <label class="fld" id="g2wrap" style="${s.split?"":"display:none"}"><span class="lab">Second grade <span class="hint">(must be sequential)</span></span>
         <select id="grade2">${opts(s.grade2)}</select></label>
     </div>
     <div class="grid2" style="margin-top:12px">
       <label class="fld"><span class="lab">Default unit duration <span class="hint">weeks</span></span>
         <input type="number" id="defWeeks" min="1" max="40" value="${s.defaultWeeks}"></label>
     </div>
     <div class="breaks-block" style="margin-top:20px">
       <div class="lab" style="font-size:13px;font-weight:620;margin-bottom:8px">Breaks &amp; holidays <span class="hint">excluded from teaching time; units flow around them</span></div>
       <div id="breakList"></div>
       <button class="btn add-break" id="addBreak" type="button">+ Add break</button>
     </div>
     <p class="empty-note" id="splitNote"></p>
   </div>`;
  const $=id=>document.getElementById(id);
  $("start").onchange=e=>{s.start=e.target.value;renderRail();renderActions();};
  $("end").onchange=e=>{s.end=e.target.value;renderRail();renderActions();};
  $("split").onchange=e=>{s.split=e.target.checked; if(s.split)syncSecondGrade(); setupStep(); renderRail();};
  $("grade").onchange=e=>{s.grade=e.target.value; if(s.split)syncSecondGrade(); setupStep();};
  $("grade2").onchange=e=>{s.grade2=e.target.value; setupStep();};
  $("defWeeks").onchange=e=>{s.defaultWeeks=Math.max(1,+e.target.value||1);};
  renderBreaks(); $("addBreak").onclick=addBreak;
  function note(){const n=$("splitNote"); n.textContent = s.split
    ? `Standards will be shown grouped by Grade ${s.grade} and Grade ${s.grade2}.` : "";}
  note();
}
function findBreak(id){return state.breaks.find(b=>b.id===id);}
function addBreak(){
  const ys=state.setup.start;
  state.breaks.push({id:++state.breakSeq,name:"",start:ys,end:iso(addDays(parseISO(ys),6))});
  renderBreaks(); renderRail(); renderActions();
}
function renderBreaks(){
  const el=document.getElementById("breakList"); if(!el)return;
  if(!state.breaks.length){
    el.innerHTML=`<p class="empty-note" style="margin:0 0 10px">No breaks yet — add winter break, spring break, pro-D days, etc.</p>`;
    return;
  }
  el.innerHTML=state.breaks.map(b=>`
    <div class="break-row" data-id="${b.id}">
      <input type="text" class="bk-name" data-id="${b.id}" placeholder="e.g. Winter break" value="${esc(b.name)}">
      <input type="date" class="bk-start" data-id="${b.id}" value="${b.start}">
      <span class="dash">–</span>
      <input type="date" class="bk-end" data-id="${b.id}" value="${b.end}">
      <button class="bk-del" data-id="${b.id}" title="Remove break" aria-label="Remove break">✕</button>
    </div>`).join("");
  // name uses oninput (keep focus, no re-render); dates re-validate gating
  el.querySelectorAll(".bk-name").forEach(i=>i.oninput=()=>{const b=findBreak(+i.dataset.id);if(b)b.name=i.value;});
  el.querySelectorAll(".bk-start").forEach(i=>i.onchange=()=>{const b=findBreak(+i.dataset.id);if(b){b.start=i.value;renderRail();renderActions();}});
  el.querySelectorAll(".bk-end").forEach(i=>i.onchange=()=>{const b=findBreak(+i.dataset.id);if(b){b.end=i.value;renderRail();renderActions();}});
  el.querySelectorAll(".bk-del").forEach(btn=>btn.onclick=()=>{
    state.breaks=state.breaks.filter(x=>x.id!==+btn.dataset.id);
    renderBreaks(); renderRail(); renderActions();
  });
}
function syncSecondGrade(){
  const i=GRADE_ORDER.indexOf(state.setup.grade);
  state.setup.grade2 = GRADE_ORDER[Math.min(i+1,GRADE_ORDER.length-1)];
  if(state.setup.grade2===state.setup.grade) state.setup.grade2=GRADE_ORDER[Math.max(0,i-1)];
}

/* ===================================================================== *
 * Step 2 — Unit builder
 * ===================================================================== */
function unitsStep(){
  main.innerHTML=`
   <div class="step-head wide">
     <h2>Build units</h2>
     <p>1. Select your first overarching transdisciplinary theme.</p>
     <p>2. Pick the subjects you want to connect to that theme.</p>
     <p>3. Expand each subject's <em>Curricular Competencies</em> and <em>Content</em> sections, then select the skills and content you want to cover.</p>
     <p>4. Do the same for your remaining chosen subjects.</p>
   </div>
   <div class="theme-tabs" id="themeTabs"></div>
   <div id="unitBody"></div>`;
  renderThemeTabs();
  renderUnitBody();
}
function renderThemeTabs(){
  document.getElementById("themeTabs").innerHTML=THEMES.map((t,i)=>`
    <button class="theme-tab ${i===state.activeTheme?"active":""}" data-i="${i}" style="${i===state.activeTheme?`border-color:${t.color}`:""}">
      <span class="swatch" style="background:${t.color}"></span>
      <span class="tt">${t.name}</span>
      ${unitStarted(i)?'<span class="chk">●</span>':""}
    </button>`).join("");
  document.querySelectorAll("#themeTabs .theme-tab").forEach(b=>b.onclick=()=>{state.activeTheme=+b.dataset.i;renderThemeTabs();renderUnitBody();});
}
function renderUnitBody(){
  const i=state.activeTheme, t=THEMES[i], u=state.units[i];
  const subjects=subjectNames();
  const body=document.getElementById("unitBody");
  body.innerHTML=`
   <div class="card spine" style="border-left-color:${t.color}">
     <div class="step-head"><h2 style="font-size:18px">${t.name}</h2></div>
     <div style="margin-top:14px"><div class="lab" style="font-size:13px;font-weight:620;margin-bottom:8px">Subjects in this unit</div>
       <div class="chips" id="subjChips">
         ${subjects.map(s=>`<button class="chip" data-s="${esc(s)}" aria-pressed="${u.subjects.includes(s)}">${esc(s)}</button>`).join("")
            || '<span class="empty-note">No subjects found in the loaded curriculum.</span>'}
       </div>
     </div>
     <div id="subjCards"></div>
     <div style="margin-top:22px">
       <label class="fld"><span class="lab">Central idea <span class="hint">one overarching statement for the whole unit</span></span>
         <textarea id="central" placeholder="e.g. Communities adapt to the environments they live in.">${esc(u.centralIdea)}</textarea></label>
     </div>
     <div style="margin-top:14px">
       <label class="fld"><span class="lab">Assessment</span>
         <textarea id="assess" placeholder="Describe how learning in this unit will be assessed.">${esc(u.assessment)}</textarea></label>
     </div>
   </div>`;
  document.querySelectorAll("#subjChips .chip").forEach(c=>c.onclick=()=>toggleSubject(c.dataset.s));
  document.getElementById("central").oninput=e=>u.centralIdea=e.target.value;
  document.getElementById("assess").oninput=e=>u.assessment=e.target.value;
  renderSubjectCards();
}
function toggleSubject(s){
  const u=state.units[state.activeTheme];
  if(u.subjects.includes(s)){u.subjects=u.subjects.filter(x=>x!==s);}
  else{
    u.subjects.push(s);
    u.perSubject[s]=u.perSubject[s]||{selected:new Set(),keyConcepts:""};
    state.ui.collapsed[kCard(s)]=true;   // newly added subjects start collapsed
  }
  renderThemeTabs(); renderUnitBody();
}
function stdId(subj,grade,kind,j){return `${subj}::${grade}::${kind}::${j}`;}

/* ---- collapse helpers ---- */
function kCard(subj){return `card::${state.activeTheme}::${subj}`;}
function kSec(subj,g,kind){return `sec::${state.activeTheme}::${subj}::${g}::${kind}`;}
function kGrp(subj,g,kind,gk){return `grp::${state.activeTheme}::${subj}::${g}::${kind}::${gk}`;}
function isCollapsed(key,def){const v=state.ui.collapsed[key];return v===undefined?def:v;}
function setCollapsed(key,val){state.ui.collapsed[key]=val;}
function groupize(items){
  const order=[],map=new Map();
  items.forEach((it,j)=>{const k=it.group||"";if(!map.has(k)){map.set(k,[]);order.push(k);}map.get(k).push([it,j]);});
  return order.map(k=>({key:k,members:map.get(k)}));
}

function renderSubjectCards(){
  const u=state.units[state.activeTheme];
  const wrap=document.getElementById("subjCards");
  if(!u.subjects.length){wrap.innerHTML="";return;}
  wrap.innerHTML=u.subjects.map(subj=>{
    const ps=u.perSubject[subj]||(u.perSubject[subj]={selected:new Set(),keyConcepts:""});
    const cardKey=kCard(subj), cardCol=isCollapsed(cardKey,true);   // collapsed by default
    const gradeBlocks=grades().map(g=>{
      const {comp,content}=standardsFor(subj,g);
      const head=state.setup.split?`<div class="grade-band">Grade ${g}</div>`:"";
      if(!comp.length&&!content.length) return head+`<div class="empty-note">No standards listed for Grade ${g}.</div>`;
      return head+renderSection("Curricular competencies","comp",comp,subj,g,ps)
                 +renderSection("Content","content",content,subj,g,ps);
    }).join("");
    return `<div class="subj-card">
      <button class="subj-head" type="button" data-collapse="${esc(cardKey)}" data-def="1">
        <span class="chev" id="v_${cssId(cardKey)}">${cardCol?"▸":"▾"}</span>
        <span class="subj-name">${esc(subj)}</span>
        <span class="count" id="c_${cssId(cardKey)}">${ps.selected.size} selected</span>
      </button>
      <div class="subj-body" id="b_${cssId(cardKey)}" ${cardCol?"hidden":""}>
        ${gradeBlocks}
        <label class="fld keyc"><span class="lab">Notes <span class="hint">for ${esc(subj)} in this unit — e.g. connection, causation, perspective</span></span>
          <input type="text" data-kc="${esc(subj)}" value="${esc(ps.keyConcepts)}"></label>
      </div></div>`;
  }).join("");

  wireSubjectCards(wrap,u);
}

function renderSection(title,kind,items,subj,g,ps){
  if(!items.length)return "";
  const secKey=kSec(subj,g,kind), col=isCollapsed(secKey,false);  // expanded by default
  let sel=0; items.forEach((it,j)=>{if(ps.selected.has(stdId(subj,g,kind,j)))sel++;});
  let body="";
  groupize(items).forEach(grp=>{
    if(grp.key){
      // named "theme" -> its own collapsible group
      const grpKey=kGrp(subj,g,kind,grp.key), gcol=isCollapsed(grpKey,false);
      let gsel=0; grp.members.forEach(([it,j])=>{if(ps.selected.has(stdId(subj,g,kind,j)))gsel++;});
      const rows=grp.members.map(([it,j])=>stdRow(it,j,subj,g,kind,ps)).join("");
      body+=`<div class="std-grp">
        <button class="grp-head" type="button" data-collapse="${esc(grpKey)}" data-def="0">
          <span class="chev" id="v_${cssId(grpKey)}">${gcol?"▸":"▾"}</span>
          <span class="grp-name">${esc(grp.key)}</span>
          <span class="grp-count" id="c_${cssId(grpKey)}">${gsel?gsel+" selected":""}</span>
        </button>
        <div class="grp-body" id="b_${cssId(grpKey)}" ${gcol?"hidden":""}>${rows}</div>
      </div>`;
    }else{
      // ungrouped items sit directly under the section
      body+=grp.members.map(([it,j])=>stdRow(it,j,subj,g,kind,ps)).join("");
    }
  });
  return `<div class="std-section ${kind}">
    <button class="sec-head" type="button" data-collapse="${esc(secKey)}" data-def="0">
      <span class="chev" id="v_${cssId(secKey)}">${col?"▸":"▾"}</span>
      <span class="sec-title">${title}</span>
      <span class="sec-count" id="c_${cssId(secKey)}">${sel}/${items.length}</span>
    </button>
    <div class="sec-body" id="b_${cssId(secKey)}" ${col?"hidden":""}>${body}</div>
  </div>`;
}

function stdRow(it,j,subj,g,kind,ps){
  const id=stdId(subj,g,kind,j), eid="e_"+cssId(id);
  const hasElab=it.elaborations&&Object.keys(it.elaborations).length;
  return `<div class="std">
    <div class="std-row">
      <input type="checkbox" data-id="${id}" ${ps.selected.has(id)?"checked":""} aria-label="${esc(it.text)}">
      <span class="txt">${esc(it.text)}</span>
      ${hasElab?`<button class="exp" type="button" data-target="${eid}">notes</button>`:""}
    </div>
    ${hasElab?`<dl class="elab" id="${eid}">${Object.entries(it.elaborations).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join("")}</dl>`:""}
  </div>`;
}

function wireSubjectCards(wrap,u){
  // collapse toggles (subject card / section / group) — DOM-only, preserves other state
  wrap.querySelectorAll("[data-collapse]").forEach(btn=>btn.onclick=()=>{
    const key=btn.dataset.collapse, def=btn.dataset.def==="1";
    const now=!isCollapsed(key,def); setCollapsed(key,now);
    const body=document.getElementById("b_"+cssId(key));
    const chev=document.getElementById("v_"+cssId(key));
    if(body)body.hidden=now;
    if(chev)chev.textContent=now?"▸":"▾";
  });
  // elaboration notes
  wrap.querySelectorAll(".exp").forEach(b=>b.onclick=()=>{
    const el=document.getElementById(b.dataset.target); el.classList.toggle("open");
    b.textContent=el.classList.contains("open")?"hide notes":"notes";
  });
  // checkboxes — update counts in place at every level
  wrap.querySelectorAll('input[type=checkbox][data-id]').forEach(cb=>cb.onchange=()=>{
    const subj=cb.dataset.id.split("::")[0];
    const ps=u.perSubject[subj];
    if(cb.checked)ps.selected.add(cb.dataset.id);else ps.selected.delete(cb.dataset.id);
    refreshCounts(subj,ps);
    renderThemeTabs();
  });
  // key concepts
  wrap.querySelectorAll('input[data-kc]').forEach(inp=>inp.oninput=()=>{
    u.perSubject[inp.dataset.kc].keyConcepts=inp.value;
  });
}

function refreshCounts(subj,ps){
  const set=(id,txt)=>{const el=document.getElementById(id);if(el)el.textContent=txt;};
  set("c_"+cssId(kCard(subj)),`${ps.selected.size} selected`);
  grades().forEach(g=>{
    ["comp","content"].forEach(kind=>{
      const {comp,content}=standardsFor(subj,g);
      const items=kind==="comp"?comp:content;
      let sel=0; items.forEach((it,j)=>{if(ps.selected.has(stdId(subj,g,kind,j)))sel++;});
      set("c_"+cssId(kSec(subj,g,kind)),`${sel}/${items.length}`);
      groupize(items).forEach(grp=>{
        if(!grp.key)return;
        let gsel=0; grp.members.forEach(([it,j])=>{if(ps.selected.has(stdId(subj,g,kind,j)))gsel++;});
        set("c_"+cssId(kGrp(subj,g,kind,grp.key)),gsel?gsel+" selected":"");
      });
    });
  });
}

function scheduleStep(){
  main.innerHTML=`
   <div class="step-head wide"><h2>Order &amp; Schedule</h2>
     <p>Only units you’ve started in step 2 appear here. Dates are pre-filled from your school-year start and default duration, flowing around any breaks — edit a unit’s dates to override, and drag the handle to reorder.</p></div>
   <div id="schedList"></div>
   <div id="breakRef"></div>
   <div id="schedMeter"></div>`;
  renderSchedule();
}
function renderSchedule(){
  const sc=schedule();
  const list=document.getElementById("schedList");
  if(!sc.rows.length){
    list.innerHTML=`<div class="banner">No units started yet. Go back to <strong>Build units</strong> and add subjects (or a central idea) to at least one theme — only started units are scheduled and exported.</div>`;
    document.getElementById("breakRef").innerHTML="";
    document.getElementById("schedMeter").innerHTML="";
    return;
  }
  list.innerHTML=sc.rows.map(r=>{
    const t=THEMES[r.idx];
    const sVal=iso(r.start), eVal=iso(r.end);
    let badge,warn="";
    if(r.valid){
      badge=`<span class="wk-badge">≈ ${fmtWeeks(r.spanDays)} weeks</span>`;
      if(r.breakDays)badge+=`<span class="wk-sub">${fmtWeeks(r.teachingDays)} teaching · ${r.breakDays}d in breaks</span>`;
      if(!r.withinYear)warn=`<div class="row-warn">Outside the school year.</div>`;
    }else badge=`<span class="wk-badge none">end before start</span>`;
    return `<div class="sched-row ${dragIdx===r.idx?"dragging":""}" data-idx="${r.idx}" style="border-left-color:${t.color}">
      <span class="drag-handle" data-idx="${r.idx}" title="Drag to reorder" aria-label="Drag to reorder ${esc(t.name)}">⠿</span>
      <div class="nm">${r.pos+1}. ${t.name}<small>${esc(unitSummary(r.idx))}</small></div>
      <div class="udates">
        <input type="date" class="ud-start" data-idx="${r.idx}" value="${sVal}">
        <span class="dash">–</span>
        <input type="date" class="ud-end" data-idx="${r.idx}" value="${eVal}">
        ${r.manual?`<button class="reset-dates" data-idx="${r.idx}" title="Reset to auto dates">auto</button>`:""}
      </div>
      <div class="wk-cell">${badge}${warn}</div>
    </div>`;
  }).join("");
  document.querySelectorAll(".drag-handle").forEach(h=>h.addEventListener("pointerdown",e=>startDrag(e,+h.dataset.idx)));
  document.querySelectorAll(".ud-start").forEach(i=>i.onchange=()=>setUnitDate(+i.dataset.idx,"start",i.value));
  document.querySelectorAll(".ud-end").forEach(i=>i.onchange=()=>setUnitDate(+i.dataset.idx,"end",i.value));
  document.querySelectorAll(".reset-dates").forEach(b=>b.onclick=()=>{
    delete state.unitDates[+b.dataset.idx]; renderSchedule(); renderRail(); renderActions();
  });
  renderBreakRef(sc);
  renderSchedMeter(sc);
}
function setUnitDate(idx,which,val){
  // capture current effective (auto) dates first so editing one side doesn't drop the other
  const ud=state.unitDates[idx]||(state.unitDates[idx]={...effectiveDatesFor(idx)});
  ud[which]=val;
  if(!ud.start&&!ud.end)delete state.unitDates[idx];
  renderSchedule(); renderRail(); renderActions();
}
function renderBreakRef(sc){
  const el=document.getElementById("breakRef");
  if(!sc.breaks.length){
    el.innerHTML=`<div class="break-ref"><span class="br-head">No breaks set.</span> <button class="linklike" id="toSetup">Add them in Plan setup</button> and units will flow around them.</div>`;
  }else{
    el.innerHTML=`<div class="break-ref"><span class="br-head">Breaks <button class="linklike" id="toSetup">edit</button></span>
      ${sc.breaks.map(b=>`<span class="br-chip ${b.withinYear?"":"bad"}"><span class="br-dot"></span>${esc(b.name||"Break")} · ${nice(b.start)}–${nice(b.end)} (${b.days}d)</span>`).join("")}</div>`;
  }
  const t=document.getElementById("toSetup"); if(t)t.onclick=()=>{state.step=0;render();};
}
function renderSchedMeter(sc){
  const m=document.getElementById("schedMeter");
  const teach=sc.rows.reduce((a,r)=>a+(r.valid?r.teachingDays:0),0);
  const brkTotal=sc.breaks.reduce((a,b)=>a+b.days,0);
  let banner;
  if(sc.issues.length)banner=`<div class="banner">${esc(sc.issues[0])} Fix the dates above — export stays locked until every unit sits inside the school year.</div>`;
  else banner=`<div class="banner ok">Every unit has valid in-year dates. You're ready to generate the plan.</div>`;
  m.innerHTML=`<div class="meter"><strong>${sc.rows.length}</strong> unit(s) · <strong>${fmtWeeks(teach)}</strong> weeks of teaching time${brkTotal?` · <strong>${brkTotal}</strong> break day(s)`:""}.</div>${banner}`;
}
function unitSummary(idx){const u=state.units[idx];const s=u.subjects.length?u.subjects.join(", "):"no subjects yet";return s;}

/* ---- pointer-based drag reorder (mouse + touch), started units only ---- */
let dragIdx=null;
function writeStartedOrder(newStarted){
  let k=0;
  state.order=state.order.map(idx=>unitStarted(idx)?newStarted[k++]:idx);
}
function startDrag(e,idx){
  e.preventDefault();
  dragIdx=idx;
  renderSchedule();
}
function onPointerMove(e){
  if(dragIdx==null)return;
  e.preventDefault();
  const rows=[...document.querySelectorAll(".sched-row")];
  if(!rows.length)return;
  let target=rows.length-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i].getBoundingClientRect();
    if(e.clientY < r.top + r.height/2){ target=i; break; }
  }
  const started=state.order.filter(unitStarted);
  const from=started.indexOf(dragIdx);
  if(from===-1||target===from)return;
  started.splice(target,0,started.splice(from,1)[0]);
  writeStartedOrder(started);
  renderSchedule();
}
function endDrag(){
  if(dragIdx==null)return;
  dragIdx=null;
  renderSchedule(); renderRail(); renderActions();
}
window.addEventListener("pointermove",onPointerMove,{passive:false});
window.addEventListener("pointerup",endDrag);
window.addEventListener("pointercancel",endDrag);

/* ===================================================================== *
 * Workbook generation (xlsx-js-style — styled)
 * ===================================================================== */
async function generate(){
  const sc=schedule(); if(!sc.ready)return;
  if(typeof XLSX==="undefined"||!XLSX.utils){
    document.getElementById("actionMsg").textContent="Spreadsheet library still loading — try again.";return;}
  const wb=XLSX.utils.book_new();

  // Sheet 1 — overview
  const ov=[
    [xc("BC Elementary Year Plan",STY.ovTitle)],
    [xc(`Grade ${grades().join(" / ")}    ·    ${niceFull(parseISO(state.setup.start))} – ${niceFull(parseISO(state.setup.end))}`,STY.ovSub)],
    [],
    [xc("Unit",STY.ovHead),xc("Transdisciplinary Theme",STY.ovHead),xc("Dates",STY.ovHead),xc("Weeks",STY.ovHead),xc("Subjects",STY.ovHead)]
  ];
  sc.rows.forEach((r,p)=>{const u=state.units[r.idx];
    ov.push([xn(p+1,STY.ovCell),xc(THEMES[r.idx].name,themeCell(THEME_HEX[r.idx])),
             xc(`${nice(r.start)} – ${nice(r.end)}`,STY.ovCell),xn(Math.round(r.spanDays/7*10)/10,STY.ovCell),
             xc(u.subjects.join(", "),STY.ovCell)]);});
  if(sc.breaks.length){
    ov.push([]);
    ov.push([xc("Break",STY.ovBreakHead),xc("",STY.ovBreakHead),xc("Dates",STY.ovBreakHead),xc("Days",STY.ovBreakHead),xc("",STY.ovBreakHead)]);
    sc.breaks.forEach(b=>ov.push([xc(b.name||"Break",STY.ovBreakCell),xc("",STY.ovBreakCell),
      xc(`${nice(b.start)} – ${nice(b.end)}`,STY.ovBreakCell),xn(b.days,STY.ovBreakCell),xc("",STY.ovBreakCell)]));
  }
  const ovWs=XLSX.utils.aoa_to_sheet(ov);
  ovWs["!cols"]=[{wch:6},{wch:36},{wch:20},{wch:8},{wch:46}];
  ovWs["!merges"]=[{s:{r:0,c:0},e:{r:0,c:4}},{s:{r:1,c:0},e:{r:1,c:4}}];
  ovWs["!rows"]=[{hpt:20},{hpt:16}];
  XLSX.utils.book_append_sheet(wb,ovWs,"Year Overview");

  // Sheet 2 — Unit Planner (week-by-week template: subjects × themes, coloured
  // per theme, breaks as vertical bands, non-theme subjects greyed out).
  XLSX.utils.book_append_sheet(wb,buildPlannerSheet(sc),"Year Plan Template");

  // Sheets 3+ — per started unit (subjects as side-by-side aligned columns)
  sc.rows.forEach((r,p)=>{
    const t=THEMES[r.idx];
    const ws=buildUnitSheet(r,p,state.units[r.idx],t,THEME_HEX[r.idx]);
    XLSX.utils.book_append_sheet(wb,ws,sheetName(p+1,t.name));
  });

  await writeWorkbookWithFreeze(wb,`BC_Elementary_Year_Plan_Grade_${grades().join("-")}.xlsx`,"Unit Planner");
  document.getElementById("actionMsg").textContent="Workbook downloaded ✓";
}
function collectSelected(subj,ps){
  const out={comp:[],content:[]};
  grades().forEach(g=>{
    const {comp,content}=standardsFor(subj,g);
    comp.forEach((it,j)=>{if(ps.selected.has(stdId(subj,g,"comp",j)))out.comp.push(state.setup.split?{...it,text:`[G${g}] ${it.text}`}:it);});
    content.forEach((it,j)=>{if(ps.selected.has(stdId(subj,g,"content",j)))out.content.push(state.setup.split?{...it,text:`[G${g}] ${it.text}`}:it);});
  });
  return out;
}
function elabLines(it){return it.elaborations?Object.entries(it.elaborations).map(([k,v])=>`${k}: ${v}`):[];}
function sheetName(n,name){return `${n}. ${name}`.replace(/[\\\/\?\*\[\]:]/g,"").slice(0,31);}

/* ===================================================================== *
 * Unit Planner sheet — a week-by-week template (Gantt-style).
 *   • Two frozen header rows: Week N, and that week's Monday date. Weeks are
 *     always whole (never cut short); a week whose start falls inside a break is
 *     dropped and the break appears as its own single column at that spot.
 *   • Each break is one column whose merged, centred label sits in the body
 *     (below the header rows, so it never crosses the freeze line).
 *   • For every week, a subject taught in that week's theme gets a single
 *     theme-tinted cell (NOT merged — teachers type a lesson per week); a
 *     subject NOT taught in that theme gets a greyed, merged span instead.
 *   • The subject column + the two header rows are frozen (injected post-write).
 *   No title row and no theme-band row: both would have produced merges that
 *   straddle the freeze boundary (which Excel rejects), and neither is needed —
 *   the per-week cell colour already shows each theme's span.
 * ===================================================================== */
function lightenHex(hex,f){
  const n=parseInt(hex,16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*f); g=Math.round(g+(255-g)*f); b=Math.round(b+(255-b)*f);
  return ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).toUpperCase();
}
function plannerColumns(sc){
  const brks=[...sc.breaks].filter(b=>b.end>=b.start).sort((a,b)=>a.start-b.start);
  // Whole weeks stepping 7 days from the school-year start. A week whose start
  // lands inside a break is skipped (that time belongs to the break); weeks are
  // never truncated, so there are no ragged short weeks.
  const weeks=[]; let cursor=new Date(sc.ys), guard=0;
  while(cursor<=sc.ye && guard++<600){
    if(!brks.some(b=>b.start<=cursor && cursor<=b.end)){
      const e=addDays(cursor,6);
      weeks.push({type:"week",start:new Date(cursor),end:e>sc.ye?new Date(sc.ye):e});
    }
    cursor=addDays(cursor,7);
  }
  const breakCols=brks.filter(b=>b.start<=sc.ye && b.end>=sc.ys)
    .map(b=>({type:"break",name:b.name,start:b.start,end:b.end}));
  // Interleave by chronology; on a tie the week sorts before the break.
  const cols=weeks.concat(breakCols)
    .sort((a,b)=>(a.start-b.start) || (a.type==="week"?-1:1));
  let weekNo=1; cols.forEach(c=>{ if(c.type==="week") c.weekNo=weekNo++; });
  // assign each week to the unit it overlaps the most
  cols.forEach(col=>{ if(col.type!=="week")return; let best=null,bo=0;
    sc.rows.forEach(r=>{const ov=overlapDays(col.start,col.end,r.start,r.end);if(ov>bo){bo=ov;best=r.idx;}});
    col.unitIdx=bo>0?best:null; });
  return cols;
}
function buildPlannerSheet(sc){
  const cols=plannerColumns(sc);
  const used=new Set(); sc.rows.forEach(r=>state.units[r.idx].subjects.forEach(s=>used.add(s)));
  const subjects=subjectNames().filter(s=>used.has(s));

  const HEADER="EEF0EC", INK="20262E", GREY="EDEDED", BREAKC="F4CCCC";
  const sHdr={fill:{fgColor:{rgb:HEADER}},font:{bold:true,sz:10,color:{rgb:INK}},
    alignment:{horizontal:"center",vertical:"center"},border:thinB("D9DCD6")};
  const sDate={fill:{fgColor:{rgb:HEADER}},font:{sz:9,color:{rgb:"5A6675"}},
    alignment:{horizontal:"center",vertical:"center"},border:thinB("D9DCD6")};
  const sSubj={fill:{fgColor:{rgb:"F4F6F2"}},font:{bold:true,sz:11,color:{rgb:INK}},
    alignment:{vertical:"center",wrapText:true},border:thinB("D9DCD6")};
  const sMember=hex=>({fill:{fgColor:{rgb:hex}},font:{sz:10,color:{rgb:INK}},
    alignment:{vertical:"top",wrapText:true},border:thinB("FFFFFF")});
  const sGrey={fill:{fgColor:{rgb:GREY}},font:{sz:9,italic:true,color:{rgb:"AAB0AA"}},
    alignment:{horizontal:"center",vertical:"center"},border:thinB("FFFFFF")};
  const sBreak={fill:{fgColor:{rgb:BREAKC}},font:{bold:true,sz:10,color:{rgb:"8A4B16"}},
    alignment:{horizontal:"center",vertical:"center",wrapText:true},border:thinB("E8C39A")};
  
  // New style for the body cells of the break (colored, but no text and standard borders)
  const sBreakBody={fill:{fgColor:{rgb:BREAKC}}, border:thinB("FFFFFF")};

  const ws={}, merges=[];
  const enc=XLSX.utils.encode_cell;
  const put=(r,c,v,s)=>{ws[enc({r,c})]={v:v==null?"":String(v),t:"s",s:s||{}};};
  const lastCol=cols.length;                 
  const R_WK=0,R_DATE=1,R_BODY=2;            
  const lastRow=R_BODY+Math.max(1,subjects.length)-1;

  // Header rows
  put(R_WK,0,"",sHdr); put(R_DATE,0,"Subject",sHdr);
  cols.forEach((col,k)=>{const c=k+1;
    if(col.type==="week"){ 
      put(R_WK,c,"Week "+col.weekNo,sHdr); 
      put(R_DATE,c,nice(col.start),sDate); 
    } else {
      // Break columns: Title in the "Subject" row (R_DATE) with a generic label in R_WK
      put(R_WK,c,"Break",sBreak);
      put(R_DATE,c,col.name||"Break",sBreak);
    }
  });

  if(!subjects.length){
    put(R_BODY,0,"Add subjects to your units to fill in this planner.",
      {font:{italic:true,sz:11,color:{rgb:"5A6675"}}});
  }else subjects.forEach((subj,si)=>{
    const r=R_BODY+si;
    put(r,0,subj,sSubj);
    let k=0;
    while(k<cols.length){
      const col=cols[k];
      
      // Break cells are now handled inline: colored but unmerged
      if(col.type==="break"){ 
        put(r,k+1,"",sBreakBody); 
        k++; 
        continue; 
      }
      
      const idx=col.unitIdx;
      const member = idx!=null && state.units[idx].subjects.includes(subj);
      if(member){ put(r,k+1,"",sMember(lightenHex(THEME_HEX[idx],0.74))); k++; continue; } 
      if(idx==null){ put(r,k+1,"",{}); k++; continue; }       
      
      let j=k;
      while(j+1<cols.length && cols[j+1].type==="week"){
        const ni=cols[j+1].unitIdx;
        const nMember = ni!=null && state.units[ni].subjects.includes(subj);
        if(ni==null || nMember) break;
        j++;
      }
      const c0=k+1,c1=j+1;
      put(r,c0,"—",sGrey); for(let cc=c0+1;cc<=c1;cc++)put(r,cc,"",sGrey);
      if(c1>c0)merges.push({s:{r,c:c0},e:{r,c:c1}});
      k=j+1;
    }
  });

  ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:lastRow,c:Math.max(lastCol,1)}});
  ws["!merges"]=merges;
  ws["!cols"]=[{wch:22},...cols.map(col=>({wch:col.type==="break"?14:14}))];
  ws["!rows"]=[{hpt:16},{hpt:16},...Array.from({length:Math.max(1,subjects.length)},()=>({hpt:34}))];
  return ws;
}

/* xlsx-js-style can't write freeze panes, so write the workbook to bytes, inject
 * a <pane> into the planner sheet's XML (frozen at B3 = first col + 2 header
 * rows), and download. Falls back to a plain write (no freeze) if JSZip is
 * unavailable or anything goes wrong. */
async function writeWorkbookWithFreeze(wb,filename,plannerSheetName){
  if(typeof JSZip==="undefined"){ XLSX.writeFile(wb,filename); return; }
  try{
    const buf=XLSX.write(wb,{type:"array",bookType:"xlsx"});
    const zip=await JSZip.loadAsync(buf);
    const wbXml=await zip.file("xl/workbook.xml").async("string");
    const relsXml=await zip.file("xl/_rels/workbook.xml.rels").async("string");
    const st=[...wbXml.matchAll(/<sheet[^>]*?name="([^"]+)"[^>]*?r:id="([^"]+)"[^>]*?\/>/g)]
              .find(m=>m[1]===plannerSheetName);
    if(st){
      const rel=[...relsXml.matchAll(/<Relationship[^>]*?Id="([^"]+)"[^>]*?Target="([^"]+)"[^>]*?\/>/g)]
                 .find(m=>m[1]===st[2]);
      if(rel){
        const path="xl/"+rel[2].replace(/^\/?xl\//,"");
        const fz='<sheetView tabSelected="1" workbookViewId="0">'
          +'<pane xSplit="1" ySplit="2" topLeftCell="B3" activePane="bottomRight" state="frozen"/>'
          +'<selection pane="topRight"/><selection pane="bottomLeft"/>'
          +'<selection pane="bottomRight" activeCell="B3" sqref="B3"/></sheetView>';
        let xml=await zip.file(path).async("string");
        xml=xml.replace(/<sheetView[^>]*workbookViewId="0"\s*\/>/,fz)
               .replace(/<sheetView[^>]*workbookViewId="0"\s*>[\s\S]*?<\/sheetView>/,fz);
        zip.file(path,xml);
      }
    }
    const blob=await zip.generateAsync({type:"blob",
      mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},1500);
  }catch(err){
    console.error("Freeze-pane injection failed; writing without freeze.",err);
    XLSX.writeFile(wb,filename);
  }
}

/* Build one unit's worksheet. Subjects sit side-by-side (one column each) so the
 * Curricular Competencies band and the Content band line up horizontally across
 * subjects: each band is exactly as tall as the subject with the most items, and
 * shorter subjects get blank padding cells so every row aligns. Elaborations ride
 * along as a cell note (hover/▸ marker) instead of extra rows, keeping the grid
 * intact. Banner, dates, central idea and assessment span the full width. */
function buildUnitSheet(r,p,u,t,hex){
  const subjects=u.subjects.map(name=>{
    const ps=u.perSubject[name]||{selected:new Set(),keyConcepts:""};
    const sel=collectSelected(name,ps);
    return {name, key:(ps.keyConcepts||"").trim(), comp:sel.comp, content:sel.content};
  });
  const N=Math.max(1,subjects.length);
  const ws={}, merges=[], ref={s:{r:0,c:0},e:{r:0,c:N-1}};
  let R=0;
  const put=(rr,cc,cell)=>{ws[XLSX.utils.encode_cell({r:rr,c:cc})]=cell;
    if(rr>ref.e.r)ref.e.r=rr; if(cc>ref.e.c)ref.e.c=cc;};
  const fullRow=cell=>{put(R,0,cell); if(N>1)merges.push({s:{r:R,c:0},e:{r:R,c:N-1}}); R++;};
  const noteCell=(text,style,it)=>{
    const cell=xc("•  "+text,style);
    const lines=elabLines(it);
    if(lines.length){cell.c=[{a:"BC Curriculum",t:lines.join("\n")}]; cell.c.hidden=true;}
    return cell;
  };

  // full-width header block
  fullRow(xc(`Unit ${p+1} — ${t.name}`,themeBand(hex)));
  fullRow(xc(`Dates: ${nice(r.start)} – ${nice(r.end)}     |     ${fmtWeeks(r.spanDays)} weeks${r.breakDays?` (${fmtWeeks(r.teachingDays)} teaching)`:""}`,STY.meta));
  if(r.overlaps.length)fullRow(xc(`Breaks during this unit: ${r.overlaps.map(o=>`${o.name} (${o.days}d)`).join(", ")}`,STY.breakNote));
  fullRow(xc(`Central Idea: ${u.centralIdea||"—"}`,STY.central));
  fullRow(xc(SEP,STY.sep));

  if(!subjects.length){
    fullRow(xc("No subjects selected for this unit.",STY.bullet));
  }else{
    // subject name row, then a key-concepts row — one cell per subject column
    subjects.forEach((s,c)=>put(R,c,xc(s.name,STY.subjHead))); R++;
    subjects.forEach((s,c)=>put(R,c, s.key?xc(`Notes: ${s.key}`,STY.keyCol):xc("",STY.pad))); R++;

    const band=(label,arrKey,style,headStyle)=>{
      const max=Math.max(0,...subjects.map(s=>s[arrKey].length));
      fullRow(xc(label,headStyle));
      if(max===0){ fullRow(xc(`(no ${arrKey==="comp"?"competencies":"content"} selected for any subject)`,STY.elab)); return; }
      for(let j=0;j<max;j++){
        subjects.forEach((s,c)=>{
          const it=s[arrKey][j];
          put(R,c, it?noteCell(it.text,style,it):xc("",STY.pad));
        });
        R++;
      }
    };
    band("Curricular Competencies","comp",STY.cellComp,STY.compHead);
    band("Content","content",STY.cellCont,STY.contHead);
  }

  // full-width footer
  fullRow(xc(SEP,STY.sep));
  fullRow(xc("Assessment",STY.label));
  fullRow(xc(u.assessment||"—",STY.bullet));

  ws["!ref"]=XLSX.utils.encode_range(ref);
  if(merges.length)ws["!merges"]=merges;
  ws["!cols"]=Array.from({length:N},()=>({wch:36}));
  ws["!rows"]=[{hpt:22}];
  return ws;
}

/* ===================================================================== *
 * Data loading — auto-fetch on load, manual picker as fallback/override
 * ===================================================================== */
function applyData(data,label,isSample){
  state.data=data; state.dataLabel=label;
  state.units=THEMES.map(()=>({subjects:[],perSubject:{},centralIdea:"",assessment:""}));
  state.order=[0,1,2,3,4,5]; state.durations={}; state.unitDates={}; state.activeTheme=0;
  state.ui={collapsed:{}};
  // breaks and setup (school year, grade, default duration) persist across reloads
  const chip=document.getElementById("dataChip");
  chip.classList.toggle("sample",!!isSample);
  document.getElementById("dataLabel").textContent=label;
}
document.getElementById("loadBtn").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const j=JSON.parse(rd.result);
      if(!j.subjects||typeof j.subjects!=="object")throw new Error("missing 'subjects'");
      applyData(j,f.name,false); render();
    }catch(err){alert("That file doesn't look like a curriculum database.\n\n"+err.message);}
  };
  rd.readAsText(f);
};

/* ===================================================================== *
 * Utils
 * ===================================================================== */
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function cssId(s){return s.replace(/[^a-zA-Z0-9]/g,"_");}
function cssEsc(s){return s.replace(/"/g,'\\"');}

/* ===================================================================== *
 * Boot: try the hosted database first, fall back to the bundled sample.
 * (fetch() of a local file:// path is blocked by browsers, so a
 *  double-clicked copy lands on the sample and the picker still works.)
 * ===================================================================== */
async function boot(){
  try{
    const res=await fetch("bc_curriculum.json",{cache:"no-cache"});
    if(res.ok){
      const j=await res.json();
      if(j&&j.subjects&&typeof j.subjects==="object"){
        applyData(j,"bc_curriculum.json",false); render(); return;
      }
    }
  }catch(e){ /* missing file or file:// — use the sample */ }
  applyData(SAMPLE,"Sample data",true); render();
}
boot();
</script>
